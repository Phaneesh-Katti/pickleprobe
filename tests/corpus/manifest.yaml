# Real-world evaluation corpus — published sources only (no synthetic bytecode).
# Refresh: ./scripts/fetch_corpus.sh

version: 3
storage: samples

samples:
  # --- WolfpackArmy: HuggingFace PyTorch pickle RCE PoC repo ---
  - id: wolfpack-benign-model
    path: samples/wolfpack-army/benign_model.pt
    label: benign
    technique: T_benign_pytorch_zip
    source: https://huggingface.co/WolfpackArmy/pytorch-pickle-rce-poc
    notes: "Clean control model shipped with the PoC repository"
    expected_globals: []
    expect_no_sinks: true

  - id: wolfpack-benign-torchscript
    path: samples/wolfpack-army/benign_torchscript.pt
    label: benign
    technique: T_benign_torchscript
    source: https://huggingface.co/WolfpackArmy/pytorch-pickle-rce-poc
    notes: "TorchScript artifact; limited PVM coverage expected"
    expected_globals: []
    expect_no_sinks: true

  - id: wolfpack-mal-torchsave
    path: samples/wolfpack-army/poc_torchsave.pt
    label: malicious
    technique: T_pytorch_torchsave
    source: https://huggingface.co/WolfpackArmy/pytorch-pickle-rce-poc
    notes: "torch.save() ACE PoC; GLOBAL builtins.eval"
    expected_globals:
      - { opcode: GLOBAL, module: __builtin__, name: eval, resolved: true }
    expected_sink_invocations:
      - __builtin__.eval
    min_reduce_events: 1

  - id: wolfpack-mal-statedict
    path: samples/wolfpack-army/poc_evil_statedict.pt
    label: malicious
    technique: T_pytorch_statedict
    source: https://huggingface.co/WolfpackArmy/pytorch-pickle-rce-poc
    notes: "Malicious state_dict embedded in PyTorch ZIP"
    expected_sink_invocations:
      - __builtin__.eval
    min_reduce_events: 1

  # --- Rodion111: PyTorch .pt2 weights_only fallback ACE ---
  - id: rodion-mal-pt2
    path: samples/rodion111/malicious.pt2
    label: malicious
    technique: T_pt2_fallback_ace
    source: https://huggingface.co/Rodion111/pytorch-pt2-ace-poc
    notes: "STACK_GLOBAL subprocess.check_output; real published bypass PoC"
    expected_globals:
      - { opcode: STACK_GLOBAL, module: subprocess, name: check_output, resolved: true }
    expected_sink_invocations:
      - subprocess.check_output
    min_reduce_events: 1

  # --- picklescan: HF Hub scanner reference test corpus ---
  - id: pscan-benign-v4
    path: samples/picklescan/benign0_v4.pkl
    label: benign
    technique: T_benign_literals
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "picklescan benign reference (protocol 4 literals)"
    expected_globals: []
    expect_no_sinks: true

  - id: pscan-benign-pytorch-bin
    path: samples/picklescan/new_pytorch_model.bin
    label: benign
    technique: T_benign_pytorch_rebuild
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "Small HF-style pytorch_model.bin with torch rebuild globals only"
    expected_globals:
      - { module: torch._utils, name: _rebuild_tensor_v2 }
    expect_no_sinks: true
    min_reduce_events: 1

  - id: pscan-mal-eval-chain
    path: samples/picklescan/malicious0.pkl
    label: malicious
    technique: T_eval_compile_chain
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "Multi-stage eval/compile chain; picklescan canonical malicious0"
    expected_globals:
      - { opcode: GLOBAL, module: __builtin__, name: eval, resolved: true }
    expected_sink_invocations:
      - __builtin__.eval
    min_reduce_events: 2

  - id: pscan-mal-bdb-global
    path: samples/picklescan/malicious15a.pkl
    label: malicious
    technique: T_bdb_debugger_global
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "bdb.Bdb debugger gadget; picklescan/HF blocklist regression"
    expected_globals:
      - { opcode: GLOBAL, module: bdb, name: Bdb, resolved: true }
    min_reduce_events: 1

  - id: pscan-mal-bdb-stack-global
    path: samples/picklescan/malicious15b.pkl
    label: malicious
    technique: T_bdb_stack_global
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "STACK_GLOBAL bdb.Bdb — evades GLOBAL-only importers scan"
    expected_globals:
      - { opcode: STACK_GLOBAL, module: bdb, name: Bdb, resolved: true }
    min_reduce_events: 1

  - id: pscan-mal-magic-bypass
    path: samples/picklescan/pytorch_magic_bypass.pt
    label: malicious
    technique: T_pytorch_magic_bypass
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "PyTorch magic header bypass with builtins.eval"
    expected_sink_invocations:
      - __builtin__.eval
    min_reduce_events: 1

  - id: pscan-mal-sys-override
    path: samples/picklescan/sys_module_override_sploit.pkl
    label: malicious
    technique: T_sys_module_override
    source: https://github.com/mmaitre314/picklescan/tree/main/tests/data
    notes: "STACK_GLOBAL torch rebuild with unresolved tail; picklescan regression"
    expected_globals:
      - { opcode: STACK_GLOBAL, module: torch._utils, name: _rebuild_tensor, resolved: true }
    min_reduce_events: 1
